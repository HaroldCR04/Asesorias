  <title>Control de Asesorias - Colegio Yorkin</title>
  <style>
    *{margin:0;padding:0;box-sizing:border-box;}
    body{font-family:'Trebuchet MS',sans-serif;background:#f0f2f7;}
    @keyframes spin{to{transform:rotate(360deg);}}
    .center{display:flex;height:100vh;align-items:center;justify-content:center;}
    .spinner{width:40px;height:40px;border:4px solid #eee;border-top:4px solid #1a4a8a;border-radius:50%;animation:spin 0.8s linear infinite;}
    .setup-bg{min-height:100vh;background:linear-gradient(160deg,#0d2959 0%,#1a4a8a 55%,#c0392b 100%);display:flex;align-items:center;justify-content:center;padding:20px;}
    .setup-card{background:#fff;border-radius:20px;padding:36px 28px;width:100%;max-width:360px;box-shadow:0 24px 64px rgba(0,0,0,0.4);display:flex;flex-direction:column;align-items:center;}
    .logo-wrap{width:110px;height:110px;border-radius:50%;background:#f0f4fa;display:flex;align-items:center;justify-content:center;margin-bottom:14px;box-shadow:0 4px 16px rgba(26,74,138,0.15);}
    .logo-img{width:90px;height:90px;object-fit:contain;}
    h1.title{font-size:22px;font-weight:800;color:#1a4a8a;margin:0 0 8px;text-align:center;font-family:Georgia,serif;}
    .red-bar{width:60px;height:3px;background:#c0392b;border-radius:2px;margin-bottom:8px;}
    .sub{font-size:13px;color:#c0392b;font-weight:700;margin-bottom:20px;letter-spacing:1px;text-transform:uppercase;}
    .instr{font-size:14px;color:#555;margin-bottom:12px;text-align:center;}
    .header{background:linear-gradient(135deg,#0d2959,#1a4a8a);padding:14px 18px;display:flex;align-items:center;gap:14px;position:sticky;top:0;z-index:10;}
    .hlogobox{width:46px;height:46px;border-radius:8px;background:#fff;display:flex;align-items:center;justify-content:center;padding:4px;flex-shrink:0;}
    .hlogo{width:38px;height:38px;object-fit:contain;}
    .htitle{color:#fff;font-size:16px;font-weight:800;font-family:Georgia,serif;}
    .hsub{color:rgba(255,255,255,0.65);font-size:11px;letter-spacing:.5px;margin-top:2px;}
    .tbanner{background:#c0392b;padding:7px 18px;display:flex;align-items:center;color:#fff;font-size:13px;font-weight:600;gap:6px;}
    .topbar{background:linear-gradient(135deg,#0d2959,#1a4a8a);padding:13px 16px;display:flex;align-items:center;gap:10px;position:sticky;top:0;z-index:10;}
    .topbar-title{color:#fff;font-size:16px;font-weight:700;}
    .back{background:none;border:none;color:#fff;font-size:28px;cursor:pointer;line-height:1;padding:0;}
    .container{padding:16px;max-width:520px;margin:0 auto;}
    .stats{display:flex;gap:10px;margin:16px 0;}
    .stat{flex:1;background:#fff;border-radius:14px;padding:14px 10px;text-align:center;box-shadow:0 2px 8px rgba(0,0,0,0.07);}
    .stat.sm{padding:10px 8px;}
    .stat-icon{font-size:22px;}
    .stat.sm .stat-icon{font-size:18px;}
    .stat-val{font-weight:800;color:#1a4a8a;font-size:24px;}
    .stat.sm .stat-val{font-size:20px;}
    .stat-lbl{font-size:11px;color:#aaa;margin-top:2px;}
    .qrow{display:flex;gap:12px;margin-bottom:20px;}
    .qbtn{flex:1;background:#fff;border-radius:14px;padding:18px 10px;text-align:center;border:none;cursor:pointer;box-shadow:0 2px 8px rgba(0,0,0,0.07);}
    .sec{font-size:12px;font-weight:700;color:#aaa;margin-bottom:10px;text-transform:uppercase;letter-spacing:1px;}
    .empty{background:#fff;border-radius:14px;padding:32px;text-align:center;color:#bbb;display:flex;flex-direction:column;align-items:center;gap:8px;font-size:14px;}
    .arow{display:flex;align-items:flex-start;gap:10px;background:#fff;border-radius:12px;padding:12px 14px;margin-bottom:8px;box-shadow:0 1px 4px rgba(0,0,0,0.05);}
    .adot{width:10px;height:10px;border-radius:50%;background:#1a4a8a;margin-top:5px;flex-shrink:0;}
    .aname{font-size:15px;font-weight:600;color:#1a1a2e;}
    .ameta{font-size:12px;color:#aaa;margin-top:2px;}
    .anotes{font-size:13px;color:#666;margin-top:4px;font-style:italic;}
    .scard{display:flex;align-items:center;gap:12px;background:#fff;border-radius:12px;padding:14px;margin-bottom:10px;box-shadow:0 1px 6px rgba(0,0,0,0.07);cursor:pointer;border-left:4px solid #ccc;}
    .sname{font-size:15px;font-weight:600;color:#1a1a2e;}
    .smeta{font-size:12px;color:#aaa;margin-top:2px;}
    .av{width:42px;height:42px;border-radius:50%;display:flex;align-items:center;justify-content:center;color:#fff;font-weight:800;font-size:18px;flex-shrink:0;}
    .overlay{position:fixed;inset:0;background:rgba(0,0,0,0.5);display:flex;align-items:flex-end;justify-content:center;z-index:100;}
    .modal{background:#fff;border-radius:20px 20px 0 0;padding:24px;width:100%;max-width:500px;max-height:85vh;overflow-y:auto;position:relative;}
    .mtitle{font-size:18px;font-weight:800;color:#1a4a8a;margin-bottom:14px;}
    .xbtn{position:absolute;top:14px;right:16px;background:none;border:none;font-size:18px;cursor:pointer;color:#aaa;}
    .alist{max-height:200px;overflow-y:auto;}
    input,textarea{width:100%;padding:12px 14px;border-radius:10px;border:1.5px solid #ddd;font-size:15px;margin-bottom:12px;outline:none;font-family:inherit;resize:vertical;}
    .bp{width:100%;padding:14px;background:#1a4a8a;color:#fff;border:none;border-radius:12px;font-size:15px;font-weight:700;cursor:pointer;}
    .bd{width:100%;padding:12px;background:#fff;color:#c0392b;border:2px solid #c0392b;border-radius:12px;font-size:14px;font-weight:700;cursor:pointer;margin-top:12px;}
    .toast{position:fixed;bottom:28px;left:50%;transform:translateX(-50%);background:#0d2959;color:#fff;padding:12px 24px;border-radius:40px;font-size:14px;font-weight:600;z-index:200;white-space:nowrap;box-shadow:0 4px 16px rgba(0,0,0,0.3);}
    .ibanner{background:#27ae60;color:#fff;padding:10px 16px;display:flex;align-items:center;justify-content:space-between;gap:10px;font-size:13px;}
    .ibanner button{background:#fff;color:#27ae60;border:none;border-radius:8px;padding:6px 14px;font-weight:700;cursor:pointer;}
  </style>
</head>
<body>

function ld(k){try{return JSON.parse(localStorage.getItem(k))}catch{return null}}
function sv(k,v){localStorage.setItem(k,JSON.stringify(v))}
function fmtD(d){return new Date(d).toLocaleDateString("es-CO",{day:"2-digit",month:"short",year:"numeric"})}
function fmtT(d){return new Date(d).toLocaleTimeString("es-CO",{hour:"2-digit",minute:"2-digit"})}
function pct(a,b){return b===0?0:Math.round(a/b*100)}
function advOf(data,id){return data.advisings.filter(a=>a.studentId===id)}
function lastDays(advs){
  if(!advs.length)return null;
  const last=[...advs].sort((a,b)=>new Date(b.date)-new Date(a.date))[0];
  return Math.floor((Date.now()-new Date(last.date))/86400000);
}

let S={phase:"loading",teacher:null,data:{students:[],advisings:[]},modal:null,sel:null,toast:null,deferredPrompt:null};
function set(p){S={...S,...p};draw()}

function draw(){
  const app=document.getElementById("app");
  const ph=S.phase;
  if(ph==="loading"){app.innerHTML='<div class="center"><div class="spinner"></div></div>';return}
  if(ph==="setup"){
    app.innerHTML=`<div class="setup-bg"><div class="setup-card">
      <div class="logo-wrap"><img src="${LOGO}" class="logo-img"/></div>
      <h1 class="title">Colegio Yorkin</h1><div class="red-bar"></div>
      <p class="sub">Control de Asesorias</p>
      <p class="instr">Ingresa tu nombre para configurar este dispositivo:</p>
      <input id="inp" type="text" placeholder="Nombre del profesor"/>
      <button class="bp" onclick="doSetup()">Comenzar</button>
    </div></div>`;
    setTimeout(()=>document.getElementById("inp")?.focus(),100);
    document.getElementById("inp")?.addEventListener("keydown",e=>{if(e.key==="Enter")doSetup()});
    return;
  }
  const pending=S.data.students.filter(st=>{const d=lastDays(advOf(S.data,st.id));return d===null||d>=15});
  const withAdv=new Set(S.data.advisings.map(a=>a.studentId)).size;
  let body="";
  if(ph==="home"){
    const rec=[...S.data.advisings].sort((a,b)=>new Date(b.date)-new Date(a.date)).slice(0,6);
    body=`<header class="header">
      <div class="hlogobox"><img src="${LOGO}" class="hlogo"/></div>
      <div><div class="htitle">Colegio Yorkin</div><div class="hsub">Control de Asesorias</div></div>
    </header>
    <div class="tbanner">&#128100; ${S.teacher}</div>
    ${S.deferredPrompt?`<div class="ibanner">&#128242; Instalar app en este celular <button onclick="doInstall()">Instalar</button></div>`:""}
    <div class="container">
      <div class="stats">
        ${sc("&#128101;",S.data.students.length,"Estudiantes")}
        ${sc("&#128203;",S.data.advisings.length,"Asesorias")}
        ${sc("&#128202;",pct(withAdv,S.data.students.length)+"%","Cobertura")}
      </div>
      <div class="qrow">
        ${qb("&#128101;","Estudiantes",S.data.students.length+" registrados","#1a4a8a","goSt()")}
        ${qb("&#9888;&#65039;","Pendientes",pending.length+" sin asesoria","#c0392b","goPe()")}
      </div>
      <div class="sec">Asesorias recientes</div>
      ${rec.length===0?`<div class="empty"><span style="font-size:32px">&#128237;</span><p>Aun no hay asesorias</p></div>`
        :rec.map(adv=>{const st=S.data.students.find(x=>x.id===adv.studentId);
          return `<div class="arow"><div class="adot"></div><div style="flex:1">
            <div class="aname">${st?.name||"?"}</div>
            <div class="ameta">${fmtD(adv.date)} · ${fmtT(adv.date)}</div>
            ${adv.notes?`<div class="anotes">"${adv.notes}"</div>`:""}
          </div></div>`}).join("")}
    </div>`;
  }
  if(ph==="students"){
    body=`<div class="topbar"><button class="back" onclick="goHome()">&#8249;</button><span class="topbar-title">Estudiantes</span></div>
    <div class="container">
      <button class="bp" style="margin-bottom:16px" onclick="set({modal:'addStudent'})">+ Agregar estudiante</button>
      ${S.data.students.length===0?`<div class="empty"><span style="font-size:36px">&#128100;</span><p>Agrega tu primer estudiante</p></div>`
        :S.data.students.map(st=>{
          const cnt=advOf(S.data,st.id).length,days=lastDays(advOf(S.data,st.id)),urg=days===null||days>=15;
          return `<div class="scard" style="border-left-color:${urg?"#c0392b":"#27ae60"}" onclick="selSt(${st.id})">
            <div class="av" style="background:${urg?"#c0392b":"#1a4a8a"}">${st.name[0]}</div>
            <div style="flex:1"><div class="sname">${st.name}</div>
            <div class="smeta">${st.grade?st.grade+" · ":""}${cnt} asesoria${cnt!==1?"s":""}${days!==null?" · hace "+days+"d":""}</div></div>
            <span style="font-size:18px">${urg?"&#9888;&#65039;":"&#9989;"}</span>
          </div>`}).join("")}
    </div>`;
  }
  if(ph==="pending"){
    body=`<div class="topbar"><button class="back" onclick="goHome()">&#8249;</button><span class="topbar-title">Pendientes (+15 dias)</span></div>
    <div class="container">
      ${pending.length===0?`<div class="empty"><span style="font-size:40px">&#127881;</span><p>Todos al dia!</p></div>`
        :pending.map(st=>{const days=lastDays(advOf(S.data,st.id));
          return `<div class="scard" style="border-left-color:#c0392b" onclick="selStPe(${st.id})">
            <div class="av" style="background:#c0392b">${st.name[0]}</div>
            <div style="flex:1"><div class="sname">${st.name}</div>
            <div class="smeta" style="color:#c0392b">${days===null?"Sin asesorias":"Hace "+days+" dias"}</div></div>
          </div>`}).join("")}
    </div>`;
  }
  let modal="";
  if(S.modal==="addStudent"){modal=`<div class="overlay" onclick="set({modal:null})"><div class="modal" onclick="event.stopPropagation()">
    <button class="xbtn" onclick="set({modal:null})">✕</button>
    <div class="mtitle">Nuevo Estudiante</div>
    <input id="mn" type="text" placeholder="Nombre completo"/>
    <input id="mg" type="text" placeholder="Grado (ej: 10A)"/>
    <button class="bp" onclick="doAddSt()">Agregar</button>
  </div></div>`}
  if(S.modal==="detail"&&S.sel){
    const st=S.sel,advs=[...advOf(S.data,st.id)].sort((a,b)=>new Date(b.date)-new Date(a.date)),days=lastDays(advs);
    modal=`<div class="overlay" onclick="set({modal:null})"><div class="modal" onclick="event.stopPropagation()">
      <button class="xbtn" onclick="set({modal:null})">✕</button>
      <div class="mtitle">${st.name}</div>
      <div class="stats">${sc("&#128203;",advs.length,"Asesorias","sm")}${sc("&#128197;",days!==null?days+"d":"—","Ultimo","sm")}</div>
      <button class="bp" style="margin-bottom:12px" onclick="set({modal:'addAdv'})">+ Registrar asesoria</button>
      <div class="alist">${advs.length===0?`<p style="color:#aaa;text-align:center;font-size:14px">Sin asesorias</p>`
        :advs.map(adv=>`<div class="arow" style="margin-bottom:8px"><div class="adot"></div><div>
          <div class="ameta">${fmtD(adv.date)} · ${fmtT(adv.date)}</div>
          ${adv.notes?`<div class="anotes">"${adv.notes}"</div>`:""}
        </div></div>`).join("")}</div>
      <button class="bd" onclick="doDelSt(${st.id})">&#128465; Eliminar estudiante</button>
    </div></div>`}
  if(S.modal==="addAdv"&&S.sel){modal=`<div class="overlay" onclick="set({modal:'detail'})"><div class="modal" onclick="event.stopPropagation()">
    <button class="xbtn" onclick="set({modal:'detail'})">✕</button>
    <div class="mtitle">Nueva Asesoria</div>
    <p style="color:#555;margin-bottom:4px">Estudiante: <strong>${S.sel.name}</strong></p>
    <p style="color:#aaa;font-size:13px;margin-bottom:10px">&#128197; ${fmtD(new Date())} · ${fmtT(new Date())}</p>
    <textarea id="mn2" placeholder="Notas / observaciones (opcional)" style="height:90px"></textarea>
    <button class="bp" onclick="doAddAdv()">Guardar</button>
  </div></div>`}
  const toast=S.toast?`<div class="toast">${S.toast}</div>`:"";
  app.innerHTML=body+modal+toast;
}
function sc(icon,val,lbl,cls=""){return`<div class="stat ${cls}"><div class="stat-icon">${icon}</div><div class="stat-val">${val}</div><div class="stat-lbl">${lbl}</div></div>`}
function qb(icon,lbl,sub,col,oc){return`<button class="qbtn" style="border-top:4px solid ${col}" onclick="${oc}"><div style="font-size:28px">${icon}</div><div style="font-weight:700;font-size:14px;color:#1a1a2e;margin-top:6px">${lbl}</div><div style="font-size:12px;color:#999;margin-top:2px">${sub}</div></button>`}
function toast(m){set({toast:m});setTimeout(()=>set({toast:null}),2500)}
function persist(d){sv("yorkin:data:"+S.teacher,d);set({data:d})}
function doSetup(){const n=document.getElementById("inp")?.value?.trim();if(!n)return;localStorage.setItem("yorkin:teacher",n);set({teacher:n,data:ld("yorkin:data:"+n)||{students:[],advisings:[]},phase:"home"})}
function goHome(){set({phase:"home",modal:null})}
function goSt(){set({phase:"students",modal:null})}
function goPe(){set({phase:"pending",modal:null})}
function selSt(id){const st=S.data.students.find(s=>s.id===id);set({sel:st,modal:"detail"})}
function selStPe(id){const st=S.data.students.find(s=>s.id===id);set({sel:st,phase:"students",modal:"detail"})}
function doAddSt(){const n=document.getElementById("mn")?.value?.trim(),g=document.getElementById("mg")?.value?.trim()||"";if(!n)return;persist({...S.data,students:[...S.data.students,{id:Date.now(),name:n,grade:g}]});set({modal:null});toast("Estudiante agregado")}
function doDelSt(id){if(!confirm("Eliminar este estudiante?"))return;persist({students:S.data.students.filter(s=>s.id!==id),advisings:S.data.advisings.filter(a=>a.studentId!==id)});set({modal:null});toast("Eliminado")}
function doAddAdv(){const notes=document.getElementById("mn2")?.value||"";persist({...S.data,advisings:[...S.data.advisings,{id:Date.now(),studentId:S.sel.id,date:new Date().toISOString(),notes}]});set({modal:null});toast("Asesoria registrada")}
window.addEventListener("beforeinstallprompt",e=>{e.preventDefault();set({deferredPrompt:e})});
function doInstall(){if(!S.deferredPrompt)return;S.deferredPrompt.prompt();S.deferredPrompt.userChoice.then(()=>set({deferredPrompt:null}))}
const t=localStorage.getItem("yorkin:teacher");
if(t){S={...S,teacher:t,data:ld("yorkin:data:"+t)||{students:[],advisings:[]},phase:"home"}}else{S={...S,phase:"setup"}}
draw();
</script>
</body>
</html>
